name: Deploy Stored Procedure

on:
  push:
    paths:
      - 'scripts/**'        # ← fixed: matches your actual folder
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted    # ← fixed: runs on your local machine

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Stored Procedure Script
        run: |
          /opt/mssql-tools18/bin/sqlcmd \
            -S ${{ secrets.DB_SERVER }} \
            -d ${{ secrets.DB_NAME }} \
            -U ${{ secrets.DB_USER }} \
            -P ${{ secrets.DB_PASSWORD }} \
            -i scripts/bronze/proc_load_bronze.sql \
            -No
